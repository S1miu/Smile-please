<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMILE PLEASE - 交互控制系统</title>
    <!-- 引入 Supabase JS 库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            width: 80%;
            max-width: 600px;
            text-align: center;
        }
        .label {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            letter-spacing: 2px;
        }
        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #fff;
            color: #fff;
            width: 100%;
            font-size: 1.5rem;
            outline: none;
            text-align: left;
            padding: 10px 0;
            margin-bottom: 3rem;
        }
        button {
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            padding: 1.5rem 3rem;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        button:hover {
            background-color: #fff;
            color: #000;
        }
        button:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
            background: transparent;
        }
        #errorDisplay {
            color: #ff3333;
            margin-top: 2rem;
            font-size: 0.9rem;
            min-height: 1.2em;
        }
        /* 传输中的动画效果 */
        .transmitting {
            animation: blink 0.5s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="label">> ENTER YOUR MESSAGE_</div>
        <input type="text" id="messageInput" placeholder="你好" autofocus>
        <!-- 移除了 HTML 里的 onclick，改用 JS 绑定，避免 ReferenceError -->
        <button id="submitBtn">SUBMIT TO SYSTEM</button>
        <div id="errorDisplay"></div>
    </div>

    <script>
        // 配置信息 (使用正确的 qcwz 域名)
        const SUPABASE_URL = "https://ghkzhbfqcwzkgrmxwoww.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdoa3poYmZxY3d6a2dybXh3b3d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzEwNjksImV4cCI6MjA5MjI0NzA2OX0.YqEYNC5h_5RA6wOAEsQKBTnwAzbsFsptN82PEAWIJbk";
        const WECHAT_URL = "https://mp.weixin.qq.com/s/n9DZljUjK9J5ErMHOw8TqA";

        // 初始化 Supabase 客户端
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        // 获取 DOM 元素
        const messageInput = document.getElementById('messageInput');
        const submitBtn = document.getElementById('submitBtn');
        const errorDisplay = document.getElementById('errorDisplay');

        // 定义提交函数
        async function handleSubmission() {
            const userMessage = messageInput.value.trim();
            
            if (!userMessage) {
                errorDisplay.innerText = "ERROR: MESSAGE IS EMPTY";
                return;
            }

            // UI 反馈
            errorDisplay.innerText = "";
            submitBtn.disabled = true;
            submitBtn.innerText = "TRANSMITTING...";
            submitBtn.classList.add('transmitting');

            try {
                // 1. 发送数据到 Supabase
                const { data, error } = await supabaseClient
                    .from('commands')
                    .insert([
                        { 
                            text: userMessage, 
                            status: 'Run' 
                        }
                    ]);

                if (error) throw error;

                console.log("Transmission Successful:", data);
                submitBtn.innerText = "SUCCESS";

                // 2. 延迟跳转微信链接
                setTimeout(() => {
                    window.location.href = WECHAT_URL;
                }, 800);

            } catch (err) {
                console.error("Transmission Failed:", err);
                errorDisplay.innerText = "ERROR: " + err.message;
                submitBtn.disabled = false;
                submitBtn.innerText = "SUBMIT TO SYSTEM";
                submitBtn.classList.remove('transmitting');
            }
        }

        // 绑定点击事件
        submitBtn.addEventListener('click', handleSubmission);

        // 支持回车提交
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSubmission();
            }
        });
    </script>
</body>
</html>
