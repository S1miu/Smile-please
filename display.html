<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMILE PLEASE - SCROLLING DISPLAY</title>
    <style>
        /* 基础样式 */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 状态指示器：保持极暗 */
        #statusPanel {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 8px;
            color: #1a1a1a;
            letter-spacing: 1px;
            z-index: 100;
        }

        /* 待机界面 */
        #standby {
            font-size: 14px;
            letter-spacing: 5px;
            opacity: 0.4;
            animation: breathe 3s ease-in-out infinite;
            text-transform: uppercase;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.5; }
        }

        /* 滚动容器 */
        #displayContent {
            display: none;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            flex-direction: column;
            justify-content: center;
        }

        /* 核心字幕样式 */
        #messageWrapper {
            display: inline-block;
            white-space: nowrap;
            position: absolute;
            will-change: transform;
        }

        #messageText {
            font-size: 25vh; /* 调大字号，让滚动更有冲击力 */
            font-weight: 900;
            padding-right: 100vw; /* 确保滚动完全消失 */
            text-shadow: 3px 0 #ff0000, -3px 0 #00ffff; /* 保留色彩分离效果 */
            animation: textFlicker 0.5s infinite;
        }

        /* 滚动动画由 JS 动态创建，以适配文字长度 */

        @keyframes textFlicker {
            0% { opacity: 1; transform: skew(0deg); }
            10% { opacity: 0.8; transform: skew(1deg); }
            20% { opacity: 1; transform: skew(0deg); }
            100% { opacity: 1; transform: skew(0deg); }
        }

        /* 底部倒计时 */
        #timer {
            position: absolute;
            bottom: 50px;
            width: 100%;
            text-align: center;
            font-size: 40px;
            font-weight: bold;
            letter-spacing: 15px;
            opacity: 0.3;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>

    <div id="statusPanel">SYSTEM_ONLINE_</div>

    <div id="standby">SMILE PLEASE : READY_</div>

    <div id="displayContent">
        <div id="messageWrapper">
            <span id="messageText"></span>
        </div>
        <div id="timer">30</div>
    </div>
