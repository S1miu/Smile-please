<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMILE PLEASE - DISPLAY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 待机状态 */
        .ready-indicator {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            letter-spacing: 2px;
            opacity: 0.5;
            animation: readyBlink 2s infinite;
        }

        @keyframes readyBlink {
            0%, 50% { opacity: 0.5; }
            51%, 100% { opacity: 0; }
        }

        /* 运行状态容器 */
        .display-container {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .display-container.active {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 闪烁效果 */
        .strobe {
            animation: strobeEffect 0.1s infinite;
        }

        @keyframes strobeEffect {
            0%, 49% { background: #000; color: #fff; }
            50%, 100% { background: #fff; color: #000; }
        }

        /* 文字显示区域 */
        .message-display {
            width: 100%;
            height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            font-weight: bold;
            letter-spacing: 10px;
            text-align: center;
            padding: 0 50px;
            overflow: hidden;
            position: relative;
        }

        /* 固定显示（≤5字） */
        .message-static {
            white-space: nowrap;
        }

        /* 滚动显示（>5字） */
        .message-scroll {
            position: absolute;
            white-space: nowrap;
            left: 100%;
        }

        /* 倒计时 */
        .countdown {
            font-size: 120px;
            font-weight: bold;
            letter-spacing: 20px;
            margin-top: 50px;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>
    <!-- 待机状态 -->
    <div class="ready-indicator" id="readyIndicator">SYSTEM READY_</div>

    <!-- 运行状态 -->
    <div class="display-container" id="displayContainer">
        <div class="commands-display" id="commandsDisplay"></div>
        <div class="countdown" id="countdown">30</div>
    </div>

    <script type="module">
        import { SUPABASE_CONFIG } from './config.js';

        const readyIndicator = document.getElementById('readyIndicator');
        const displayContainer = document.getElementById('displayContainer');
        const commandsDisplay = document.getElementById('commandsDisplay');
        const countdownEl = document.getElementById('countdown');

        let isRunning = false;
        let currentTimeout = null;
        let scrollInterval = null;

        // 连接Supabase Realtime
        function connectToSupabase() {
            const ws = new WebSocket(
                SUPABASE_CONFIG.url.replace('https://', 'wss://').replace('http://', 'ws://') + 
                '/realtime/v1/websocket?apikey=' + SUPABASE_CONFIG.anonKey + 
                '&vsn=1.0.0'
            );

            ws.onopen = () => {
                console.log('WebSocket connected');
                
                // 订阅commands表的变化
                ws.send(JSON.stringify({
                    topic: 'realtime:public:commands',
                    event: 'phx_join',
                    payload: {},
                    ref: '1'
                }));

                // 发送心跳
                setInterval(() => {
                    if (ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({
                            topic: 'phoenix',
                            event: 'heartbeat',
                            payload: {},
                            ref: Date.now().toString()
                        }));
                    }
                }, 30000);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.event === 'INSERT' && data.payload && data.payload.record) {
                    const record = data.payload.record;
                    if (record.processed === false && !isRunning) {
                        triggerDisplay(record.message);
                    }
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                setTimeout(connectToSupabase, 3000);
            };

            ws.onclose = () => {
                console.log('WebSocket closed, reconnecting...');
                setTimeout(connectToSupabase, 3000);
            };
        }

        // 触发显示效果
        function triggerDisplay(message) {
            if (isRunning) return;
            isRunning = true;

            // 清除之前的定时器
            if (currentTimeout) clearTimeout(currentTimeout);
            if (scrollInterval) clearInterval(scrollInterval);

            // 隐藏待机指示器
            readyIndicator.style.display = 'none';
            
            // 显示运行容器
            displayContainer.classList.add('active');
            
            // 启动闪烁效果
            document.body.classList.add('strobe');

            // 判断文字长度
            const messageLength = message.length;
            messageDisplay.innerHTML = '';

            if (messageLength <= 5) {
                // ≤5字：固定居中显示
                const staticDiv = document.createElement('div');
                staticDiv.className = 'message-static';
                staticDiv.textContent = message;
                messageDisplay.appendChild(staticDiv);
            } else {
                // >5字：滚动显示（每秒3字符）
                const scrollDiv = document.createElement('div');
                scrollDiv.className = 'message-scroll';
                scrollDiv.textContent = message;
                messageDisplay.appendChild(scrollDiv);

                // 计算滚动参数
                const displayWidth = messageDisplay.offsetWidth;
                const messageWidth = scrollDiv.offsetWidth;
                const totalDistance = displayWidth + messageWidth;
                
                // 每秒3字符，每个字符按80px字号估算约60px宽
                const pixelsPerChar = 60;
                const charsPerSecond = 3;
                const pixelsPerSecond = charsPerSecond * pixelsPerChar;
                const duration = totalDistance / pixelsPerSecond;

                let position = displayWidth;
                const updateInterval = 50; // 50ms更新一次
                const pixelsPerUpdate = (pixelsPerSecond / 1000) * updateInterval;

                scrollInterval = setInterval(() => {
                    position -= pixelsPerUpdate;
                    scrollDiv.style.left = position + 'px';

                    // 滚动完成后重新开始
                    if (position < -messageWidth) {
                        position = displayWidth;
                    }
                }, updateInterval);
            }

            // 倒计时
            let timeLeft = 30;
            countdownEl.textContent = timeLeft;

            const countdownInterval = setInterval(() => {
                timeLeft--;
                countdownEl.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    resetDisplay();
                }
            }, 1000);

            // 30秒后自动重置
            currentTimeout = setTimeout(() => {
                resetDisplay();
            }, 30000);
        }

        // 重置显示
        function resetDisplay() {
            isRunning = false;
            
            // 停止闪烁
            document.body.classList.remove('strobe');
            
            // 清除滚动
            if (scrollInterval) {
                clearInterval(scrollInterval);
                scrollInterval = null;
            }
            
            // 隐藏运行容器
            displayContainer.classList.remove('active');
            messageDisplay.innerHTML = '';
            
            // 显示待机指示器
            readyIndicator.style.display = 'block';
        }

        // 启动连接
        connectToSupabase();

        // 测试功能（开发时使用，可以在控制台调用）
        window.testDisplay = (msg) => {
            triggerDisplay(msg || '测试消息');
        };
    </script>
</body>
</html>
