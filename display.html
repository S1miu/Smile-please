<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMILE PLEASE - 实时展示端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background 0.1s;
        }

        /* 待机状态：右下角呼吸灯 */
        .ready-indicator {
            position: absolute;
            bottom: 30px;
            right: 30px;
            font-size: 14px;
            letter-spacing: 3px;
            animation: breathe 2s infinite;
            text-transform: uppercase;
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 运行容器 */
        #displayContent {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* 闪烁背景效果 */
        .strobe-mode {
            animation: strobe 0.1s infinite;
        }
        @keyframes strobe {
            0%, 49% { background: #000; color: #fff; }
            50%, 100% { background: #fff; color: #000; }
        }

        /* 消息文字样式 */
        #messageText {
            font-size: 10vw;
            font-weight: 900;
            text-align: center;
            padding: 0 40px;
            word-break: break-all;
            line-height: 1.2;
            z-index: 20;
            text-transform: uppercase;
        }

        /* 倒计时样式 */
        #timer {
            margin-top: 40px;
            font-size: 5vw;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>

    <!-- 待机显示 -->
    <div id="standby" class="ready-indicator">System Ready_</div>

    <!-- 运行显示 -->
    <div id="displayContent">
        <div id="messageText"></div>
        <div id="timer">30</div>
    </div>

    <!-- 引入 Supabase 库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 配置信息
        const SUPABASE_URL = "https://ghkzhbfqcwzkgrmxwoww.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdoa3poYmZxY3d6a2dybXh3b3d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzEwNjksImV4cCI6MjA5MjI0NzA2OX0.YqEYNC5h_5RA6wOAEsQKBTnwAzbsFsptN82PEAWIJbk";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const standbyEl = document.getElementById('standby');
        const contentEl = document.getElementById('displayContent');
        const textEl = document.getElementById('messageText');
        const timerEl = document.getElementById('timer');

        let isRunning = false;

        // 核心功能：触发 30 秒展示
        function triggerInstallation(message) {
            if (isRunning) return;
            isRunning = true;

            // 1. 切换 UI 状态
            standbyEl.style.display = 'none';
            contentEl.style.display = 'flex';
            document.body.classList.add('strobe-mode');
            textEl.innerText = message;

            // 2. 倒计时逻辑
            let timeLeft = 30;
            timerEl.innerText = timeLeft;

            const countdown = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    resetInstallation();
                }
            }, 1000);
        }

        // 重置回待机
        function resetInstallation() {
            isRunning = false;
            document.body.classList.remove('strobe-mode');
            contentEl.style.display = 'none';
            standbyEl.style.display = 'block';
            textEl.innerText = "";
        }

        // 3. 订阅数据库实时变动 (Realtime)
        console.log("正在监听指令...");
        supabaseClient
            .channel('any')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'commands' }, payload => {
                console.log('检测到新指令:', payload.new);
                if (payload.new.status === 'Run' || payload.new.status === 'RUN') {
                    triggerInstallation(payload.new.text);
                }
            })
            .subscribe();

        // 调试用：点击屏幕手动模拟一次触发
        // window.onclick = () => triggerInstallation("调试测试");
    </script>
</body>
</html>
