<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMILE PLEASE - ART DISPLAY</title>
    <style>
        /* 基础样式：极致纯黑 */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 状态指示器：极暗调试，不干扰展览 */
        #statusPanel {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 8px;
            color: #111; 
            z-index: 100;
        }

        /* 待机状态 */
        #standby {
            font-size: 14px;
            letter-spacing: 5px;
            opacity: 0.3;
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.4; }
        }

        /* 运行容器 */
        #displayContent {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* 文字包装层 */
        #messageWrapper {
            position: absolute;
            will-change: transform;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        /* 核心文字样式 */
        #messageText {
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
        }

        /* --- 微微错层故障效果 (Subtle Glitch) --- */
        /* 使用 clip-path 模拟信号错位断裂，不使用红蓝重影 */
        .glitch-layer {
            position: relative;
        }

        .glitch-layer::before,
        .glitch-layer::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .glitch-layer::before {
            left: 2px;
            text-shadow: -1px 0 #fff;
            clip-path: inset(45% 0 44% 0);
            animation: glitchTop 4s infinite linear alternate-reverse;
        }

        .glitch-layer::after {
            left: -2px;
            text-shadow: -1px 0 #888;
            clip-path: inset(50% 0 30% 0);
            animation: glitchBot 2s infinite linear alternate-reverse;
        }

        @keyframes glitchTop {
            0%, 100% { clip-path: inset(45% 0 44% 0); transform: translate(0); }
            10% { clip-path: inset(10% 0 85% 0); transform: translate(4px); }
            20% { clip-path: inset(80% 0 10% 0); transform: translate(-4px); }
        }

        @keyframes glitchBot {
            0%, 100% { clip-path: inset(50% 0 30% 0); transform: translate(0); }
            15% { transform: translate(-2px); }
            25% { clip-path: inset(15% 0 75% 0); transform: translate(2px); }
        }

        /* 静态模式：全屏放大居中 */
        .mode-static {
            width: 100%;
            font-size: 35vh; 
            text-align: center;
        }

        /* 滚动模式：常规大小并运动 */
        .mode-scroll {
            font-size: 25vh;
            white-space: nowrap;
        }

        /* 底部倒计时 */
        #timer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            opacity: 0.15;
            letter-spacing: 10px;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>

    <div id="statusPanel">BOOTING...</div>
    <div id="standby">READY_</div>

    <div id="displayContent">
        <div id="messageWrapper">
            <span id="messageText" class="glitch-layer"></span>
        </div>
        <div id="timer">30</div>
    </div>

    <!-- 引入 Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://ghkzhbfqcwzkgrmxwoww.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdoa3poYmZxY3d6a2dybXh3b3d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzEwNjksImV4cCI6MjA5MjI0NzA2OX0.YqEYNC5h_5RA6wOAEsQKBTnwAzbsFsptN82PEAWIJbk";

        let supabaseClient;
        let isRunning = false;
        let scrollAnimation = null;
        let lastProcessedId = null;

        const panel = document.getElementById('statusPanel');
        const standbyEl = document.getElementById('standby');
        const contentEl = document.getElementById('displayContent');
        const wrapperEl = document.getElementById('messageWrapper');
        const textEl = document.getElementById('messageText');
        const timerEl = document.getElementById('timer');

        function initialize() {
            if (typeof window.supabase === 'undefined') {
                setTimeout(initialize, 500);
                return;
            }
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                panel.innerText = "SYSTEM_SYNCED_POLLING";
                startPolling(); // 使用轮询避开 WebSocket 安全错误
            } catch (e) {
                panel.innerText = "INIT_ERR:" + e.message;
            }
        }

        // 轮询逻辑：每秒抓取一次最新数据
        async function startPolling() {
            setInterval(async () => {
                if (isRunning) return; 

                try {
                    const { data, error } = await supabaseClient
                        .from('commands')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(1);

                    if (error) throw error;
                    if (data && data.length > 0) {
                        handleNewMessage(data[0]);
                    }
                } catch (err) {
                    console.error("Polling error:", err.message);
                }
            }, 1000);
        }

        function handleNewMessage(record) {
            if ((record.status === 'Run' || record.status === 'RUN') && record.id !== lastProcessedId) {
                // 首次加载记录 ID 避免重复触发
                if (lastProcessedId === null) { 
                    lastProcessedId = record.id; 
                    return; 
                }
                lastProcessedId = record.id;
                runSequence(record.text || "...");
            }
        }

        function runSequence(msg) {
            if (isRunning) return;
            isRunning = true;

            // 1. 初始化显示
            standbyEl.style.display = 'none';
            contentEl.style.display = 'block';
            textEl.innerText = msg;
            textEl.setAttribute('data-text', msg); 

            const charCount = msg.length;
            
            // 2. 根据字数决定模式
            if (charCount <= 5) {
                // --- 静态全屏模式 ---
                wrapperEl.style.width = "100%";
                wrapperEl.style.left = "0";
                wrapperEl.classList.remove('mode-scroll');
                wrapperEl.classList.add('mode-static');
                wrapperEl.style.transform = "none";
                if (scrollAnimation) scrollAnimation.cancel();
            } else {
                // --- 滚动模式 ---
                wrapperEl.classList.remove('mode-static');
                wrapperEl.classList.add('mode-scroll');
                
                const textWidth = wrapperEl.offsetWidth;
                const containerWidth = window.innerWidth;
                const duration = Math.max(10, (textWidth + containerWidth) / 160); 

                scrollAnimation = wrapperEl.animate([
                    { transform: `translateX(${containerWidth}px)` },
                    { transform: `translateX(${-textWidth}px)` }
                ], {
                    duration: duration * 1000,
                    iterations: Infinity,
                    easing: 'linear'
                });
            }

            // 3. 30秒倒计时
            let secondsLeft = 30;
            timerEl.innerText = secondsLeft;
            const countdown = setInterval(() => {
                secondsLeft--;
                timerEl.innerText = secondsLeft;
                if (secondsLeft <= 0) {
                    clearInterval(countdown);
                    stopSequence();
                }
            }, 1000);
        }

        function stopSequence() {
            isRunning = false;
            if (scrollAnimation) scrollAnimation.cancel();
            contentEl.style.display = 'none';
            standbyEl.style.display = 'block';
            textEl.innerText = "";
        }

        window.onload = initialize;
    </script>
</body>
</html>
