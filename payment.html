<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAYMENT VERIFICATION</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .payment-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .instruction-text {
            font-size: 1.8rem;
            margin-bottom: 4rem;
            letter-spacing: 0.2rem;
            text-align: center;
            line-height: 1.8;
            animation: glitchText 3s infinite;
        }

        .confirm-btn {
            width: 500px;
            max-width: 90vw;
            height: 100px;
            background: black;
            color: white;
            border: 3px solid white;
            font-size: 1.8rem;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .confirm-btn:hover {
            background: white;
            color: black;
        }

        .confirm-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Glitch验证动画 */
        .verification-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .verification-overlay.active {
            display: flex;
            animation: strobe 0.1s infinite;
        }

        .verification-text {
            font-size: 3rem;
            animation: glitchVerify 0.3s infinite;
        }

        @keyframes strobe {
            0%, 50% { background: black; }
            51%, 100% { background: white; }
        }

        @keyframes glitchVerify {
            0% {
                color: white;
                text-shadow: 2px 2px red, -2px -2px blue;
                transform: translate(0);
            }
            25% {
                color: black;
                text-shadow: -2px 2px blue, 2px -2px red;
                transform: translate(-5px, 5px);
            }
            50% {
                color: white;
                text-shadow: 2px -2px red, -2px 2px blue;
                transform: translate(5px, -5px);
            }
            75% {
                color: black;
                text-shadow: -2px -2px blue, 2px 2px red;
                transform: translate(-5px, -5px);
            }
            100% {
                color: white;
                text-shadow: 2px 2px red, -2px -2px blue;
                transform: translate(0);
            }
        }

        .success-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .success-container.active {
            display: flex;
        }

        .success-text {
            font-size: 4rem;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <!-- 确认界面 -->
    <div class="payment-container" id="paymentPhase">
        <div class="instruction-text">
            > MESSAGE RECEIVED<br>
            > ACTIVATE SYSTEM?
        </div>
        
        <button class="confirm-btn" id="confirmBtn">
            ACTIVATE NOW
        </button>
    </div>

    <!-- Glitch验证动画 -->
    <div class="verification-overlay" id="verificationOverlay">
        <div class="verification-text">
            SYSTEM VERIFYING...
        </div>
    </div>

    <!-- 成功页面 -->
    <div class="success-container" id="successPhase">
        <div class="success-text">
            > PAYMENT VERIFIED_
        </div>
        <div style="margin-top: 2rem; font-size: 1.2rem;">
            SYSTEM ACTIVATED
        </div>
    </div>

    <script type="module" src="payment.js"></script>
</body>
</html>
